name: kuafor_sepeti
description: A modern mobile app for booking hairdresser appointments
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.3.0
  geolocator: ^14.0.2
  provider: ^6.1.5+1
  intl: ^0.20.2
  uuid: ^4.5.2
  shared_preferences: ^2.5.3
  image_picker: ^1.2.1
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
