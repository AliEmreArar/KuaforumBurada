<!DOCTYPE html>

<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dükkan Sahibi Kayıt Formu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#13a4ec",
            "background-light": "#f6f7f8",
            "background-dark": "#101c22",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col group/design-root overflow-x-hidden">
<div class="sticky top-0 z-10 flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-200 dark:border-gray-700">
<div class="text-[#111618] dark:text-white flex size-12 shrink-0 items-center">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Dükkan Sahibi Kayıt</h2>
<div class="size-12 shrink-0"></div>
</div>
<main class="flex-1 pb-28">
<div class="flex flex-col gap-2">
<!-- İşletme Bilgileri -->
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">İşletme Bilgileri</h3>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Dükkan Adı</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-gray-200 dark:bg-gray-800 h-14 placeholder:text-[#617c89] p-4 rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" readonly="" value="Glamour Hair Studio"/>
<div class="text-[#617c89] dark:text-gray-400 flex border-none bg-gray-200 dark:bg-gray-800 items-center justify-center pr-4 rounded-r-lg border-l-0">
<span class="material-symbols-outlined">lock</span>
</div>
</div>
</label>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Lokasyon</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 placeholder:text-[#617c89] p-4 rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" placeholder="Adres seçin" value=""/>
<div class="text-[#617c89] dark:text-gray-400 flex border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 items-center justify-center pr-4 rounded-r-lg border-l-0">
<span class="material-symbols-outlined">map</span>
</div>
</div>
</label>
</div>
<div class="flex items-center gap-4 bg-background-light dark:bg-background-dark px-4 min-h-[72px] py-2 justify-between border-y border-gray-200 dark:border-gray-700">
<div class="flex items-center gap-4">
<div class="text-[#111618] dark:text-white flex items-center justify-center rounded-lg bg-gray-200 dark:bg-gray-800 shrink-0 size-12">
<span class="material-symbols-outlined">schedule</span>
</div>
<div class="flex flex-col justify-center">
<p class="text-[#111618] dark:text-white text-base font-medium leading-normal line-clamp-1">Çalışma Saatleri</p>
<p class="text-[#617c89] dark:text-gray-400 text-sm font-normal leading-normal line-clamp-2">Pazartesi - Pazar: 09:00 - 19:00</p>
</div>
</div>
<div class="shrink-0">
<div class="text-[#111618] dark:text-white flex size-7 items-center justify-center">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Çalışan Sayısı</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<select class="form-select flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 p-4 text-base font-normal leading-normal">
<option>1-5</option>
<option>6-10</option>
<option>11-20</option>
<option>20+</option>
</select>
</div>
</label>
</div>
<!-- Yasal Bilgiler -->
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Yasal Bilgiler</h3>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Yasal Sahip Adı Soyadı</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 placeholder:text-[#617c89] p-4 text-base font-normal leading-normal" placeholder="Adınız Soyadınız"/>
</label>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Vergi Numarası</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 placeholder:text-[#617c89] p-4 text-base font-normal leading-normal" placeholder="10 haneli vergi numaranız"/>
</label>
</div>
<!-- İletişim & Giriş Bilgileri -->
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">İletişim &amp; Giriş Bilgileri</h3>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Dükkan Telefon Numarası</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 placeholder:text-[#617c89] p-4 text-base font-normal leading-normal" placeholder="0 (XXX) XXX XX XX" type="tel"/>
</label>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">E-posta</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 placeholder:text-[#617c89] p-4 text-base font-normal leading-normal" placeholder="ornek@email.com" type="email"/>
</label>
</div>
<div class="flex max-w-[480px] flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-[#111618] dark:text-gray-300 text-base font-medium leading-normal pb-2">Şifre</p>
<div class="flex w-full flex-1 items-stretch rounded-lg">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-14 placeholder:text-[#617c89] p-4 rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal" placeholder="Şifrenizi oluşturun" type="password"/>
<div class="text-[#617c89] dark:text-gray-400 flex border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 items-center justify-center pr-4 rounded-r-lg border-l-0">
<span class="material-symbols-outlined">visibility_off</span>
</div>
</div>
</label>
</div>
<!-- Dükkan Görselleri -->
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Dükkan Görselleri</h3>
<div class="px-4 py-3">
<div class="grid grid-cols-3 gap-3">
<img class="aspect-square w-full rounded-lg object-cover" data-alt="Modern hair salon interior with chairs and mirrors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBtYrDUSqeLfF5NR-23s17r9NMhf-1QfWH5jufA7ClExSTt-TB6wuZrq2pqiT_g8u-CopDo_OEoGW_6CY0Osxg0hIRf7ihTP2IWIhx0z_LJUxmANAb70Vh465_p1-h2D6L-pIxM6s7MLqP-cHkuHDUGYSRsUOUI3eMVWuvGd_JmRRAnsn6NtUjl3r1fgUmrVGhA7QZtkpgxEe8GkOQ06Br0uJg0D0q-o0PviZXRyQlkk81lAHScukjRHCFES-VrVTpOgk4vR1hxm-0"/>
<img class="aspect-square w-full rounded-lg object-cover" data-alt="Bright and clean barber shop with stylish equipment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3l9VGjFMFMs5Sd4SQLt8DvxC5jv1-DxBoTeIWHm-fTPJ1WiISabR2T7Bpc0yFHLzUKO8kfdyLqMDCv7D2FXaLLRCEjb-fiCm3FYp31S9vS4eMDGOyWwo0-GKsmSqpqINR_4GQQzx0ygPK0dRf8WOxBEXsiGEeh8XV9DFKKTDrfIhQ7HONKw1eRPyPsOcc_fE4mLmAJlL2W3H3CVfPnViiQ306mu2OpxsnN4FmkMv_HVSHmQIOQc-8mCjCQuRYZyhzMNRN8zuvQ6c"/>
<div class="flex aspect-square w-full cursor-pointer items-center justify-center rounded-lg border-2 border-dashed border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800/50">
<div class="text-center">
<span class="material-symbols-outlined text-4xl text-gray-400 dark:text-gray-500">add_photo_alternate</span>
<p class="mt-1 text-xs text-gray-500 dark:text-gray-400">Fotoğraf Ekle</p>
</div>
</div>
</div>
</div>
<!-- Hizmet Menüsü -->
<h3 class="text-[#111618] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] px-4 pb-2 pt-4">Hizmet Menüsü</h3>
<div class="flex flex-col gap-3 px-4 py-3">
<div class="flex items-center gap-2">
<input class="form-input flex-1 rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-12 placeholder:text-[#617c89] px-4 text-base" placeholder="Hizmet Adı (örn: Saç Kesim)"/>
<input class="form-input w-28 rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-12 placeholder:text-[#617c89] px-4 text-base" placeholder="Fiyat (₺)"/>
<button class="flex size-12 items-center justify-center rounded-lg bg-gray-200 dark:bg-gray-700 text-[#617c89] dark:text-gray-400 shrink-0">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<div class="flex items-center gap-2">
<input class="form-input flex-1 rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-12 placeholder:text-[#617c89] px-4 text-base" value="Manikür"/>
<input class="form-input w-28 rounded-lg text-[#111618] dark:text-white dark:placeholder:text-gray-500 focus:outline-0 focus:ring-0 border-none bg-white dark:bg-background-dark border border-gray-200 dark:border-gray-700 h-12 placeholder:text-[#617c89] px-4 text-base" value="250"/>
<button class="flex size-12 items-center justify-center rounded-lg bg-gray-200 dark:bg-gray-700 text-[#617c89] dark:text-gray-400 shrink-0">
<span class="material-symbols-outlined">delete</span>
</button>
</div>
<button class="mt-2 flex w-full items-center justify-center gap-2 rounded-lg border-2 border-dashed border-gray-300 dark:border-gray-600 py-3 text-sm font-semibold text-primary">
<span class="material-symbols-outlined">add_circle</span>
<span>Yeni Hizmet Ekle</span>
</button>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 z-10 bg-background-light dark:bg-background-dark p-4 pt-3 border-t border-gray-200 dark:border-gray-700">
<div class="flex items-center mb-4">
<input class="form-checkbox h-5 w-5 rounded border-gray-300 dark:border-gray-600 text-primary focus:ring-primary bg-gray-100 dark:bg-gray-900" id="consent" type="checkbox"/>
<label class="ml-2 text-sm text-[#111618] dark:text-gray-300" for="consent">
<a class="font-semibold text-primary" href="#">Kullanım Koşulları</a>'nı okudum ve kabul ediyorum.
        </label>
</div>
<button class="flex w-full items-center justify-center rounded-xl bg-primary px-6 py-4 text-base font-bold text-white transition-all hover:bg-primary/90">
        Kaydı Tamamla
      </button>
</div>
</div>
</body></html>
